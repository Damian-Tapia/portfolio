<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Damian Tapia · Portafolio</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300..900;1,300..900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hifi/tokens.css"/>
<link rel="stylesheet" href="hifi/styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="hifi/copy.jsx"></script>
<script type="text/babel" src="hifi/papel-picado.jsx"></script>
<script type="text/babel" src="hifi/sections.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "lang": "es",
  "palette": "tierra",
  "petals": false,
  "loaderMs": 3000
}/*EDITMODE-END*/;

function App() {
  const [lang, setLang] = React.useState(TWEAKS.lang);
  const [palette, setPalette] = React.useState(TWEAKS.palette);
  const [petals, setPetals] = React.useState(TWEAKS.petals);
  const [loading, setLoading] = React.useState(true);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-palette', palette);
    document.documentElement.lang = lang;
  }, [palette, lang]);

  // Tweaks host protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persist = (patch) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  return (
    <>
      {loading && <Loader onDone={() => setLoading(false)} durationMs={TWEAKS.loaderMs} lang={lang}/>}
      {petals && !loading && <FallingPetals on={petals} count={14}/>}
      <Nav lang={lang} setLang={(l) => { setLang(l); persist({ lang: l }); }}
           palette={palette} setPalette={(p) => { setPalette(p); persist({ palette: p }); }}/>
      <main>
        <Hero lang={lang}/>
        <About lang={lang}/>
        <Projects lang={lang}/>
        <Stack lang={lang}/>
        <Contact lang={lang}/>
      </main>
      <Footer lang={lang}/>

      {editMode && (
        <div className="tweaks-panel">
          <h3>Tweaks</h3>
          <div className="tweak-row">
            <label>idioma</label>
            <select value={lang} onChange={e => { setLang(e.target.value); persist({ lang: e.target.value }); }}>
              <option value="es">Español</option>
              <option value="en">English</option>
            </select>
          </div>
          <div className="tweak-row">
            <label>paleta</label>
            <select value={palette} onChange={e => { setPalette(e.target.value); persist({ palette: e.target.value }); }}>
              <option value="tierra">Tierra</option>
              <option value="noche">Noche</option>
              <option value="festivo">Festivo</option>
            </select>
          </div>
          <div className="tweak-row">
            <label>pétalos</label>
            <button className={`toggle-btn ${petals ? 'on' : ''}`} onClick={() => { const next = !petals; setPetals(next); persist({ petals: next }); }}>
              {petals ? 'ON' : 'OFF'}
            </button>
          </div>
          <div className="tweak-row">
            <label>replay loader</label>
            <button onClick={() => { setLoading(true); setTimeout(() => setLoading(false), TWEAKS.loaderMs + 800); }}>▶</button>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
